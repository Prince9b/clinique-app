name: DevOps Build and Push

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Connexion au Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Construire et Envoyer l'image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile  # <--- Vérifie bien si ton fichier est 'Dockerfile' ou 'dockerfile'
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/clinique-app:latest
